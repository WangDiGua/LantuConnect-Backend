version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # 本地联调可设 SPRING_PROFILES_ACTIVE=dev；默认不加即用 application.yml 生产向默认值
      # 与 compose 内 Prometheus 联调时可设 true；默认 false 与 application 一致
      - PERMIT_PROMETHEUS_WITHOUT_AUTH=${PERMIT_PROMETHEUS_WITHOUT_AUTH:-false}
      - DB_USER=${DB_USER:-lantu}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_ALLOW_PUBLIC_KEY_RETRIEVAL=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:-false}
      - DB_USE_SSL=${DB_USE_SSL:-false}
      # 需要自定义密钥时在 .env 中声明 JWT_SECRET、LANTU_ENCRYPTION_KEY（否则使用 application.yml 内建默认值）
      - SMS_ACCESS_KEY=${SMS_ACCESS_KEY}
      - SMS_SECRET=${SMS_SECRET}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      # 共用公司 Redis 时可在 .env 中设置 REDIS_DB=约定编号（默认 0）
      - REDIS_DB=${REDIS_DB:-0}
      # 本 compose 含 RabbitMQ：镜像内默认开启监听器；裸跑 JAR 时 application.yml 默认为 false
      - RABBITMQ_LISTENER_AUTO_STARTUP=${RABBITMQ_LISTENER_AUTO_STARTUP:-true}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=lantu_connect
      - MYSQL_USER=lantu
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
      - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_VHOST:-/}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./dist:/usr/share/nginx/html
    depends_on:
      - app

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  grafana_data:
