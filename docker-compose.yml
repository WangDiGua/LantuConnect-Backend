version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # application.yml 中占位均无默认值；Compose 须注入全套变量（可用 .env 覆盖，见 .env.example）
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/lantu_connect?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-lantu}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_DATABASE=${REDIS_DB:-0}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SERVER_PORT=8080
      - SERVER_SERVLET_CONTEXT_PATH=/regis
      - SERVER_SSL_ENABLED=false
      - SERVER_SSL_KEY_STORE=classpath:keystore.p12
      - SERVER_SSL_KEY_STORE_PASSWORD=${SERVER_SSL_KEY_STORE_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-docker-compose-change-me-jwt-secret-min-32chars}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY:-7200}
      - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY:-604800}
      - LANTU_ENCRYPTION_KEY=${LANTU_ENCRYPTION_KEY:-docker-dev-lantu-encryption-32b-key0000}
      - LANTU_SECURITY_ENCRYPTION_KEY=${LANTU_SECURITY_ENCRYPTION_KEY:-docker-dev-security-encryption-key00}
      - LANTU_SYSTEM_INTEGRATION_MOCK=${LANTU_SYSTEM_INTEGRATION_MOCK:-true}
      - LANTU_SECURITY_PERMIT_PROMETHEUS_WITHOUT_AUTH=${PERMIT_PROMETHEUS_WITHOUT_AUTH:-false}
      - SKILL_MIRROR_CATALOG_URL=${SKILL_MIRROR_CATALOG_URL:-}
      - SKILL_CATALOG_HTTP_PROXY_HOST=${SKILL_CATALOG_HTTP_PROXY_HOST:-}
      - SKILL_CATALOG_HTTP_PROXY_PORT=${SKILL_CATALOG_HTTP_PROXY_PORT:-0}
      - SKILL_GITHUB_ZIP_MIRROR_MODE=${SKILL_GITHUB_ZIP_MIRROR_MODE:-none}
      - SKILL_GITHUB_ZIP_MIRROR_PREFIX=${SKILL_GITHUB_ZIP_MIRROR_PREFIX:-}
      - SKILLHUB_FALLBACK_BASE_URL=${SKILLHUB_FALLBACK_BASE_URL:-}
      - SKILLSMP_API_KEY=${SKILLSMP_API_KEY:-}
      - FILE_UPLOAD_DIR=${FILE_UPLOAD_DIR:-/tmp/lantu-connect-uploads}
      - CORS_ALLOW_ALL_ORIGINS=${CORS_ALLOW_ALL_ORIGINS:-true}
      - CORS_RELAX_LOCALHOST=${CORS_RELAX_LOCALHOST:-true}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - SMS_ACCESS_KEY=${SMS_ACCESS_KEY:-}
      - SMS_SECRET=${SMS_SECRET:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=lantu_connect
      - MYSQL_USER=lantu
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./dist:/usr/share/nginx/html
    depends_on:
      - app

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  grafana_data:
