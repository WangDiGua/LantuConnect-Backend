lantu:
  system:
    security:
      allow-header-user-id-fallback: false
      jwt-secret-required: true
      api-key-encryption-enabled: true
    rate-limit:
      auth-login: 5
      auth-sms: 1
      skill-invoke: 100
    captcha:
      enabled: true
      type: slider
      expire-seconds: 300
      tolerance: 5
