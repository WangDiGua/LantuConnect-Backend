# =============================================================================
# 技能在线市场（平台管理员）
# -----------------------------------------------------------------------------
# 国内/网络与合规说明：
# - SkillsMP：官方文档约 500 次/天/Key，用于搜索非「封号」；暴刷、违规使用可能导致 Key 被限制。
#   本服务已做内存缓存与单词失败跳过，请勿把 cache-ttl 调得过低以免浪费配额。
# - 默认主源：公开搜索 API（agentskillhub.dev /api/v1/search，无 Key，见 https://doc.agentskillhub.dev/guide/api.html）。
#   skillhub.tencent.com 为中文官网，直接请求 /api/v1/search 多为 HTML；需要主站时请配代理或镜像 JSON，勿误用作 API base。
# - SkillsMP：需 API Key 与海外配额；默认关闭，在前端或此处改 skillsmp.enabled=true。
# - GitHub：直连 archive zip 在国内可能不稳，可配 github-zip-mirror 走你有权限的加速前缀。
# - 出访 SkillsMP / 镜像 URL 可走企业 HTTP 代理：outbound-http-proxy。
#
# 【国内 / 多源】不完全依赖 SkillsMP 时，任选其一或组合：
#   1) mirror-catalog-url + mirror-catalog-urls：多个 HTTPS JSON 源依次拉取并合并（单源失败跳过）。
#      各站需有与 SkillExternalCatalogItemVO 一致的导出（数组或 { "data": [...] }），例如可自行对接：
#      skillhub.tencent.com、cocoloop.tech、skill0.atypica.ai 等提供的公开导出地址（以各平台文档为准，填完整 URL）。
#      packUrl 可填 Gitee raw/发行版 zip、或对象存储 zip，减少对 GitHub archive 的依赖。
#   2) provider=static + entries：超管在 JSON/库里维护若干条国内可下载的 packUrl。
#   3) 仍用 SkillsMP 但网络出不去：outbound-http-proxy 指向境外代理；skillsmp.enabled=false 时可仅用镜像 JSON。
#   4) 从 URL 导入技能包：支持 HTTPS 的 https://gitee.com/owner/repo 浅克隆（见 lantu.skill-pack-import.git-bare-repo-host-suffixes）。
#     若超时，可调大 application.yml 里 skill-pack-import.connect-timeout-seconds 或环境变量 SKILL_PACK_IMPORT_CONNECT_TIMEOUT。
#
# provider:
#   static  — 仅 entries
#   skillsmp — SkillsMP ∪ mirror-catalog-url(s)（镜像可选，单条失败则跳过）
#   merge    — entries + (SkillsMP ∪ mirror…)
# =============================================================================
lantu:
  skill-external-catalog:
    provider: skillsmp
    # 远程列表用哪类源：merged（多源合并）| skillhub_only | skillsmp_only | mirror_only（仅 JSON/HTTP 镜像）
    remote-catalog-mode: merged
    cache-ttl-seconds: 3600
    # SkillsMP∪镜像结果落库镜像；库空时阻塞同步，过期异步刷新；远程失败读库内快照
    persistence-enabled: true
    # 自建或第三方导出目录（HTTPS），JSON 数组或与网关一致 { "data": [ ... ] }，字段同 SkillExternalCatalogItemVO
    mirror-catalog-url: ${SKILL_MIRROR_CATALOG_URL:}
    # 附加多个 JSON 目录（与上一项合并去重）。已实现：
    # - 根数组 / { "data": [] } / { "skills": [] }
    # - 元素含 id+name+packUrl 或 skill0 式 id+name+description+githubUrl+branch
    # - 若根含 pagination.hasNext，则自动按 ?page= 续拉（如 skill0.atypica.ai/api/skills）
    # skillhub、cocoloop 等需按其公开的「可 GET 的 JSON」地址配置；站点首页 HTML 无法解析。
    # 需要 skill0 时增加一行 URL，例如：https://skill0.atypica.ai/api/skills
    mirror-catalog-urls: []
    # 显式源（与 mirror 字符串列表二选一或混用）；format: AUTO | SKILL0（等价）
    catalog-http-sources: []
    outbound-http-proxy:
      host: ${SKILL_CATALOG_HTTP_PROXY_HOST:}
      port: ${SKILL_CATALOG_HTTP_PROXY_PORT:0}
    github-zip-mirror:
      # none | prefix-encoded | prefix-raw（前缀 + 整段原 URL；encoded 时对原 URL 做百分号编码）
      mode: ${SKILL_GITHUB_ZIP_MIRROR_MODE:none}
      prefix: ${SKILL_GITHUB_ZIP_MIRROR_PREFIX:}
    # Agent Skill Hub 兼容协议：GET /api/v1/search?q=&limit=（limit≤10，q 至少 2 字符）
    # 市场库内按条目 id 去重：同一 GitHub 仓库下不同 slug 各占一行（packUrl 仍多为整仓 zip，子目录技能导入规则见资源注册说明）
    skillhub:
      enabled: true
      base-url: https://agentskillhub.dev
      # 备用根（可选；若主 base 不可达再试）
      fallback-base-url: ${SKILLHUB_FALLBACK_BASE_URL:}
      limit-per-query: 10
      max-queries-per-request: 12
      github-default-branch: main
    skillsmp:
      enabled: false
      base-url: https://skillsmp.com/api/v1
      api-key: ${SKILLSMP_API_KEY:}
      sort-by: stars
      limit-per-query: 100
      max-queries-per-request: 12
      github-default-branch: main
    entries: []
