# ----------------------------------------------------------------------------
# 占位符说明
#   - 下文仅为 ${VAR}，无默认值；须由 application-local.yml（从 application-local.example.yml 复制）
#     或同名环境变量提供，否则启动将因无法解析占位符失败。
#   - Spring 松散绑定：SPRING_DATASOURCE_URL → spring.datasource.url 等。
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# spring.* — 数据源、Redis、上传、任务线程池
# ----------------------------------------------------------------------------

spring:
  config:
    import:
      - optional:classpath:application-local.yml
  application:
    name: nexusai-connect
  devtools:
    restart:
      enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 0
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      database: ${SPRING_DATA_REDIS_DATABASE}
      password: ${SPRING_DATA_REDIS_PASSWORD}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  task:
    execution:
      pool:
        core-size: 8
        max-size: 32
        queue-capacity: 200

# ----------------------------------------------------------------------------
# server.* — 端口、上下文路径、TLS（keystore 占位）
# ----------------------------------------------------------------------------
server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH}
  ssl:
    enabled: ${SERVER_SSL_ENABLED}
    key-store: ${SERVER_SSL_KEY_STORE}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD}
    key-store-type: PKCS12

# ----------------------------------------------------------------------------
# MyBatis-Plus — Mapper 位置、驼峰、逻辑删除与列名转义
# ----------------------------------------------------------------------------
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      column-format: "`%s`"
      logic-delete-value: 1
      logic-not-delete-value: 0

# ----------------------------------------------------------------------------
# jwt.* — 签发密钥与令牌有效期（秒）。密钥勿写入 runtime_app_config。
# ----------------------------------------------------------------------------
jwt:
  # 未设置或空白时由代码使用仅用于本地的兜底密钥（JwtBootstrapSecrets）；生产必须显式配置。
  secret: ${JWT_SECRET}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY}

# ----------------------------------------------------------------------------
# geoip.* — GeoIP 查询开关与超时（毫秒）
# ----------------------------------------------------------------------------
geoip:
  enabled: true
  timeout-ms: 2000

# ----------------------------------------------------------------------------
# lantu.* — 业务域配置（安全、网关、集成、幂等、技能包等）
# ----------------------------------------------------------------------------
lantu:
  encryption:
    key: ${LANTU_ENCRYPTION_KEY}
  security:
    jwt-enabled: true
    allow-header-user-id-fallback: false
    require-https: false
    permit-prometheus-without-auth: false
    expose-api-docs: false
    trust-proxy-forwarded-headers: false
    rate-limit:
      login-per-ip-per-minute: 50
      login-per-username-per-minute: 25
      register-per-ip-per-hour: 40
      captcha-per-ip-per-minute: 45
    encryption-key: ${LANTU_SECURITY_ENCRYPTION_KEY}
  gateway:
    invoke-http-status-reflects-upstream: true
    binding-expansion:
      enabled: true
      agent: true
      merge-active-skill-mcps: true
    capabilities:
      max-mcps-per-aggregate: ${LANTU_CAP_MAX_MCPS:0}
      max-tools-per-response: ${LANTU_CAP_MAX_TOOLS:0}
      default-max-concurrent-per-resource: ${LANTU_CAP_DEFAULT_MAX_CONCURRENT:100}
  logging:
    gateway-invoke-log-success: false
    gateway-invoke-log-payload-preview: false
    gateway-invoke-body-preview-max: 1024
    gateway-invoke-payload-preview-max: 300
    access-log-error-body-max-chars: 2048
    access-log-error-body-max-bytes: 262144
    access-log-skip-error-body-path-fragments: /auth/login,/auth/refresh,/auth/register
  api-deprecation:
    enabled: true
    deprecated-patterns:
      - /v1/**
      - /agents/**
    write-blocked-patterns:
      - /v1/**
      - /agents/**
  system:
    integration-mock: ${LANTU_SYSTEM_INTEGRATION_MOCK}
  integration:
    network-api-url: ''
    acl-api-url: ''
    mcp-allow-http: true
    mcp-allow-local-targets: true
    mcp-http-accept: application/json, text/event-stream
    app-launch-token-ttl-seconds: 300
    mcp-session-ttl-minutes: 45
    mcp-invoke-retries: 1
    oauth2:
      connect-timeout-sec: 15
  notification:
    email-enabled: false
  realtime:
    push-health: true
    push-circuit: true
    push-alert: true
    push-audit: true
    push-monitoring-kpi: true
    monitor-recipient-cache-ttl-ms: 60000
  contract:
    freeze-version: 2026-03-contract-v1
    freeze-effective-date: 2026-03-24
  # 登录页「隐私 / 用户条款」弹窗正文（纯文本，可按学校信息化要求改写；不影响鉴权）
  legal:
    privacy-title: 隐私说明
    terms-title: 用户条款
    privacy-body: |
      欢迎使用本平台。请您在登录前阅读以下关于个人信息处理与账号使用的说明。

      1. 我们收集的信息
      为完成身份认证、安全审计与合规要求，在您使用统一认证或本平台登录时，可能会处理学工号、会话标识、登录时间、客户端 IP、设备与浏览器类型等必要信息。

      2. 使用目的
      上述信息仅用于账号安全、异常检测、操作留痕及服务可用性分析，不会用于与教育、科研及管理无关的商业推广。

      3. 存储与责任
      详细的数据分类、保存期限、共享与您的权利（查阅、更正、删除等），以您所在学校及上级教育主管部门公示的《隐私政策》或《个人信息保护政策》为准；若本校另有单独公示，以本校公示为准。

      4. 联系我们
      如有疑问或行使权利，请联系本校信息化管理部门或数据保护负责人。
    terms-body: |
      使用本平台即表示您理解并同意遵守下列条款：

      1. 合法使用
      您须遵守国家法律法规及学校规章制度，不得利用本平台从事违法、侵权或干扰教学科研秩序的活动。

      2. 账号与凭证
      账号及密码、令牌等凭证仅限本人使用，不得出借、转售或由他人冒用；因保管不当造成的损失由用户自行承担。

      3. 服务内容与变更
      平台功能、接口与可用性可能随版本升级调整；重要变更将通过校内渠道或系统内公告告知。服务按「现状」提供，学校及运营方将在合理范围内保障系统安全与稳定。

      4. 知识产权与内容
      您在平台上发布或上传内容的权利归属与使用范围，须符合学校知识产权与学术规范相关规定。

      5. 争议解决
      因使用本服务产生的争议，优先按学校及平台公示的用户协议与校内申诉渠道处理。

      用户协议与隐私政策的完整版本以学校及平台公示为准；技术支持与合规咨询请联系学校信息化管理部门。
  idempotency:
    enabled: true
    processing-ttl-seconds: 60
    success-ttl-seconds: 86400

# ----------------------------------------------------------------------------
# file.* — 本地上传目录与上传分类白名单；可与 runtime_app_config 中的 /file 合并
# ----------------------------------------------------------------------------
file:
  upload-dir: ${FILE_UPLOAD_DIR}
  max-size-mb: 50
  allowed-categories: document,avatar,image,attachment,temp,dataset

# ----------------------------------------------------------------------------
# cors.* — 跨域；allow-all-origins=true 时放开任意 Origin/Headers，公网暴露请评估风险。
#           为 true 时 relax-localhost / allowed-origins 由代码路径忽略，仅在不使用任意源时生效。
# ----------------------------------------------------------------------------
cors:
  allow-all-origins: ${CORS_ALLOW_ALL_ORIGINS}
  relax-localhost: ${CORS_RELAX_LOCALHOST}
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# ----------------------------------------------------------------------------
# springdoc.* — OpenAPI / Swagger UI（默认关闭）
# ----------------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

# ----------------------------------------------------------------------------
# resilience4j — 熔断、限流、重试、舱壁、超时；实例名与代码中的 Registry 一致
# ----------------------------------------------------------------------------
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        sliding-window-size: 10
    instances:
      skillInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      networkApply:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      aclPublish:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      httpInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
      skillCatalogRemote:
        base-config: default
        failure-rate-threshold: 55
        wait-duration-in-open-state: 120s
        sliding-window-size: 24
        minimum-number-of-calls: 8
      mcpInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
  ratelimiter:
    configs:
      default:
        limit-for-period: 100
        limit-refresh-period: 1m
        timeout-duration: 0s
    instances:
      authLogin:
        base-config: default
        limit-for-period: 30
        limit-refresh-period: 1m
      authRegister:
        base-config: default
        limit-for-period: 15
        limit-refresh-period: 1h
      authRefresh:
        base-config: default
        limit-for-period: 120
        limit-refresh-period: 1m
      captchaGenerate:
        base-config: default
        limit-for-period: 60
        limit-refresh-period: 1m
      fileUpload:
        base-config: default
        limit-for-period: 20
        limit-refresh-period: 1m
  retry:
    configs:
      default:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - java.io.IOException
          - java.net.http.HttpTimeoutException
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default
      skillCatalogRemote:
        base-config: default
        max-attempts: 3
        wait-duration: 1s
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 200
        max-wait-duration: 0ms
    instances:
      skillInvoke:
        base-config: default
        max-concurrent-calls: 200
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
        max-concurrent-calls: 200
      mcpInvoke:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default

# ----------------------------------------------------------------------------
# Actuator — 暴露 health / info / prometheus
# ----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# ----------------------------------------------------------------------------
# Logback 细节见 logback-spring.xml；此处仅设置 Logger 级别
# ----------------------------------------------------------------------------
logging:
  level:
    com.lantu.connect: info
    com.lantu.connect.common.mybatis: info
    org.springframework.web: info

# =============================================================================
# Profile: dev — 本地开发（文档、宽松 MCP、本地上传路径、调试日志）
# =============================================================================
---
# 以下为 dev 覆盖项；未出现的键继承首段文档默认值。
spring:
  config:
    activate:
      on-profile: dev
  devtools:
    restart:
      enabled: true

lantu:
  security:
    expose-api-docs: true
    require-https: false
  integration:
    mcp-allow-http: true
    mcp-allow-local-targets: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    com.lantu.connect: debug
    org.springframework.web: info
