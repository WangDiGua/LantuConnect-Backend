server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: lantu-connect
  # 配合 spring-boot-devtools：本地改代码并编译后自动重启，无需每次手动停启进程
  devtools:
    restart:
      enabled: true
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:lantu_connect}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      # host: ${REDIS_HOST:192.168.5.130}
      port: ${REDIS_PORT:6379}
      # password: ${REDIS_PASSWORD:redispassword}
      # 无密码时不要配置 password。若 Redis 有密码，可在此增加：password: ${REDIS_PASSWORD}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
  task:
    execution:
      pool:
        core-size: 8
        max-size: 32
        queue-capacity: 200

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # MySQL 保留字列名（如 t_security_setting.key / value）需反引号包裹
      column-format: "`%s`"
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  # 本地默认密钥；生产务必通过环境变量 JWT_SECRET 覆盖为足够长的随机串
  secret: ${JWT_SECRET:LantuConnect-Dev-JWT-DoNotUseInProd-k9mX2pQ7vN4wR8tY3zA6bC1dE5fG0hJ}
  access-token-expiry: 7200
  refresh-token-expiry: 604800

# 会话列表地理位置（公网 IP 调用 ip-api.com，内网显示「局域网」；无外网时可设 enabled: false）
geoip:
  enabled: true
  timeout-ms: 2000

lantu:
  security:
    jwt-enabled: true
    allow-header-user-id-fallback: false
    require-https: ${REQUIRE_HTTPS:false}
    encryption-key: ${FIELD_ENCRYPTION_KEY:}
  api-deprecation:
    enabled: true
    deprecated-patterns:
      - /v1/**
      - /agents/**
    write-blocked-patterns:
      - /v1/**
      - /agents/**
  system:
    # network/apply、acl/publish 为模拟响应；false 时在代码中接真实下发逻辑
    integration-mock: true
  integration:
    network-api-url: ${NETWORK_API_URL:}
    acl-api-url: ${ACL_API_URL:}
    # MCP HTTP（Streamable）常见要求同时接受 JSON 与 SSE；与上游不符时再改
    mcp-http-accept: application/json, text/event-stream
    # 应用（app）启动令牌有效期（秒）：用于后端签发 launchToken/launchUrl 后一次性跳转
    app-launch-token-ttl-seconds: 300
    # MCP：同一 X-Api-Key 多次 /invoke 间复用上游 Mcp-Session-Id 的 Redis TTL（分钟，代码内 clamp 5–1440）
    mcp-session-ttl-minutes: 45
    # MCP HTTP 失败重试次数（每次请求独立；会话头在重试前会从 Redis 再读）
    mcp-invoke-retries: 1
  notification:
    sms-enabled: ${NOTIFICATION_SMS_ENABLED:false}
    email-enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
  contract:
    freeze-version: 2026-03-contract-v1
    freeze-effective-date: 2026-03-24
  idempotency:
    enabled: true
    processing-ttl-seconds: 60
    success-ttl-seconds: 86400

resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        sliding-window-size: 10
    instances:
      skillInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      networkApply:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      aclPublish:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      httpInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
      mcpInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
  ratelimiter:
    configs:
      default:
        limit-for-period: 100
        limit-refresh-period: 1m
        timeout-duration: 0s
    instances:
      authLogin:
        base-config: default
        limit-for-period: 30
        limit-refresh-period: 1m
      fileUpload:
        base-config: default
        limit-for-period: 20
        limit-refresh-period: 1m
  retry:
    configs:
      default:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - java.io.IOException
          - java.net.http.HttpTimeoutException
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 50
        max-wait-duration: 0ms
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default

file:
  upload-dir: ${FILE_UPLOAD_DIR:/data/lantu/uploads}
  max-size-mb: 50
  allowed-types: pdf,docx,csv,json,parquet,xlsx,jpg,jpeg,png,gif,svg
  storage-type: ${FILE_STORAGE_TYPE:local}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:lantu-connect}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.lantu.connect: debug
