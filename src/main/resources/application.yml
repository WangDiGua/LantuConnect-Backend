# ----------------------------------------------------------------------------
# 占位符说明
#   - 下文仅为 ${VAR}，无默认值；须由 application-local.yml（从 application-local.example.yml 复制）
#     或同名环境变量提供，否则启动将因无法解析占位符失败。
#   - Spring 松散绑定：SPRING_DATASOURCE_URL → spring.datasource.url 等。
# ----------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# spring.* — 数据源、Redis、上传、任务线程池
# ----------------------------------------------------------------------------

spring:
  config:
    import:
      - optional:classpath:application-local.yml
  application:
    name: nexusai-connect
  devtools:
    restart:
      enabled: false
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 8
      connection-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 0
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      database: ${SPRING_DATA_REDIS_DATABASE}
      password: ${SPRING_DATA_REDIS_PASSWORD}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  task:
    execution:
      pool:
        core-size: 8
        max-size: 32
        queue-capacity: 200

# ----------------------------------------------------------------------------
# server.* — 端口、上下文路径、TLS（keystore 占位）
# ----------------------------------------------------------------------------
server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH}
  ssl:
    enabled: ${SERVER_SSL_ENABLED}
    key-store: ${SERVER_SSL_KEY_STORE}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD}
    key-store-type: PKCS12

# ----------------------------------------------------------------------------
# MyBatis-Plus — Mapper 位置、驼峰、逻辑删除与列名转义
# ----------------------------------------------------------------------------
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      column-format: "`%s`"
      logic-delete-value: 1
      logic-not-delete-value: 0

# ----------------------------------------------------------------------------
# jwt.* — 签发密钥与令牌有效期（秒）。密钥勿写入 runtime_app_config。
# ----------------------------------------------------------------------------
jwt:
  # 未设置或空白时由代码使用仅用于本地的兜底密钥（JwtBootstrapSecrets）；生产必须显式配置。
  secret: ${JWT_SECRET}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY}

# ----------------------------------------------------------------------------
# geoip.* — GeoIP 查询开关与超时（毫秒）
# ----------------------------------------------------------------------------
geoip:
  enabled: true
  timeout-ms: 2000

# ----------------------------------------------------------------------------
# lantu.* — 业务域配置（安全、网关、集成、幂等、技能包与外部目录等）
# ----------------------------------------------------------------------------
lantu:
  encryption:
    key: ${LANTU_ENCRYPTION_KEY}
  security:
    jwt-enabled: true
    allow-header-user-id-fallback: false
    require-https: false
    permit-prometheus-without-auth: false
    expose-api-docs: false
    trust-proxy-forwarded-headers: false
    rate-limit:
      login-per-ip-per-minute: 50
      login-per-username-per-minute: 25
      register-per-ip-per-hour: 40
      captcha-per-ip-per-minute: 45
      send-sms-per-ip-per-hour: 30
    encryption-key: ${LANTU_SECURITY_ENCRYPTION_KEY}
  gateway:
    invoke-http-status-reflects-upstream: true
  logging:
    gateway-invoke-log-success: false
    gateway-invoke-log-payload-preview: false
    gateway-invoke-body-preview-max: 1024
    gateway-invoke-payload-preview-max: 300
    access-log-error-body-max-chars: 2048
    access-log-error-body-max-bytes: 262144
    access-log-skip-error-body-path-fragments: /auth/login,/auth/refresh,/auth/register
  api-deprecation:
    enabled: true
    deprecated-patterns:
      - /v1/**
      - /agents/**
    write-blocked-patterns:
      - /v1/**
      - /agents/**
  system:
    integration-mock: ${LANTU_SYSTEM_INTEGRATION_MOCK}
  integration:
    network-api-url: ''
    acl-api-url: ''
    mcp-allow-http: false
    mcp-allow-local-targets: false
    mcp-http-accept: application/json, text/event-stream
    app-launch-token-ttl-seconds: 300
    mcp-session-ttl-minutes: 45
    mcp-invoke-retries: 1
    oauth2:
      connect-timeout-sec: 15
  notification:
    sms-enabled: false
    email-enabled: false
  contract:
    freeze-version: 2026-03-contract-v1
    freeze-effective-date: 2026-03-24
  idempotency:
    enabled: true
    processing-ttl-seconds: 60
    success-ttl-seconds: 86400
  skill-pack-import:
    max-bytes: 26214400
    connect-timeout-seconds: 45
    read-timeout-seconds: 90
    max-redirects: 5
    fetch-retries: 3
    fetch-retry-delay-ms: 1000
    https-only: true
    allowed-host-suffixes: [ ]
    require-allowed-host-suffixes: false
    git-clone-enabled: true
    git-clone-timeout-seconds: 120
    git-clone-allow-bare-repo-paths: true
    git-bare-repo-host-suffixes:
      - github.com
      - www.github.com
      - gitlab.com
      - www.gitlab.com
      - bitbucket.org
      - www.bitbucket.org
      - gitee.com
      - www.gitee.com
    git-clone-max-unpacked-bytes: 41943040
  # lantu.skill-external-catalog — 在线技能市场默认；DB 键 skill_external_catalog 可全量覆盖。
  skill-external-catalog:
    provider: skillsmp
    remote-catalog-mode: merged
    cache-ttl-seconds: 3600
    persistence-enabled: true
    mirror-catalog-url: ${SKILL_MIRROR_CATALOG_URL}
    mirror-catalog-urls: []
    catalog-http-sources: []
    outbound-http-proxy:
      host: ${SKILL_CATALOG_HTTP_PROXY_HOST}
      port: ${SKILL_CATALOG_HTTP_PROXY_PORT}
    github-zip-mirror:
      mode: ${SKILL_GITHUB_ZIP_MIRROR_MODE}
      prefix: ${SKILL_GITHUB_ZIP_MIRROR_PREFIX}
    skillhub:
      enabled: true
      base-url: https://agentskillhub.dev
      fallback-base-url: ${SKILLHUB_FALLBACK_BASE_URL}
      limit-per-query: 10
      max-queries-per-request: 12
      github-default-branch: main
    skillsmp:
      enabled: false
      base-url: https://skillsmp.com/api/v1
      api-key: ${SKILLSMP_API_KEY}
      sort-by: stars
      limit-per-query: 100
      max-queries-per-request: 12
      github-default-branch: main
    entries: []

# ----------------------------------------------------------------------------
# file.* — 上传目录、允许类型与 MinIO；可与 runtime_app_config 中的 lantu.file 合并
# ----------------------------------------------------------------------------
file:
  upload-dir: ${FILE_UPLOAD_DIR}
  max-size-mb: 50
  allowed-types: pdf,docx,csv,json,parquet,xlsx,jpg,jpeg,png,gif,svg
  storage-type: ${FILE_STORAGE_TYPE}
  minio:
    endpoint: ${FILE_MINIO_ENDPOINT}
    access-key: ${FILE_MINIO_ACCESS_KEY}
    secret-key: ${FILE_MINIO_SECRET_KEY}
    bucket: ${FILE_MINIO_BUCKET}

# ----------------------------------------------------------------------------
# cors.* — 跨域；allow-all-origins=true 时放开任意 Origin/Headers，公网暴露请评估风险。
#           为 true 时 relax-localhost / allowed-origins 由代码路径忽略，仅在不使用任意源时生效。
# ----------------------------------------------------------------------------
cors:
  allow-all-origins: ${CORS_ALLOW_ALL_ORIGINS}
  relax-localhost: ${CORS_RELAX_LOCALHOST}
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# ----------------------------------------------------------------------------
# springdoc.* — OpenAPI / Swagger UI（默认关闭）
# ----------------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

# ----------------------------------------------------------------------------
# resilience4j — 熔断、限流、重试、舱壁、超时；实例名与代码中的 Registry 一致
# ----------------------------------------------------------------------------
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        sliding-window-size: 10
    instances:
      skillInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      networkApply:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      aclPublish:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      httpInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
      mcpInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
  ratelimiter:
    configs:
      default:
        limit-for-period: 100
        limit-refresh-period: 1m
        timeout-duration: 0s
    instances:
      authLogin:
        base-config: default
        limit-for-period: 30
        limit-refresh-period: 1m
      authRegister:
        base-config: default
        limit-for-period: 15
        limit-refresh-period: 1h
      authRefresh:
        base-config: default
        limit-for-period: 120
        limit-refresh-period: 1m
      authSendSms:
        base-config: default
        limit-for-period: 20
        limit-refresh-period: 1h
      captchaGenerate:
        base-config: default
        limit-for-period: 60
        limit-refresh-period: 1m
      fileUpload:
        base-config: default
        limit-for-period: 20
        limit-refresh-period: 1m
  retry:
    configs:
      default:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - java.io.IOException
          - java.net.http.HttpTimeoutException
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 50
        max-wait-duration: 0ms
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default

# ----------------------------------------------------------------------------
# Actuator — 暴露 health / info / prometheus
# ----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# ----------------------------------------------------------------------------
# Logback 细节见 logback-spring.xml；此处仅设置 Logger 级别
# ----------------------------------------------------------------------------
logging:
  level:
    com.lantu.connect: info
    com.lantu.connect.common.mybatis: info
    org.springframework.web: info

# =============================================================================
# Profile: dev — 本地开发（文档、宽松 MCP、本地上传路径、调试日志）
# =============================================================================
---
# 以下为 dev 覆盖项；未出现的键继承首段文档默认值。
spring:
  config:
    activate:
      on-profile: dev
  devtools:
    restart:
      enabled: true

lantu:
  security:
    expose-api-docs: true
    require-https: false
  integration:
    mcp-allow-http: true
    mcp-allow-local-targets: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    com.lantu.connect: debug
    org.springframework.web: info
