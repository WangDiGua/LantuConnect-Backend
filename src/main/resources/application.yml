# =============================================================================
# application.yml — NexusAI Connect 主配置（默认 profile，偏本地与联调）
#
# 【配置怎么生效】优先级从高到低：
#   命令行参数 → 操作系统环境变量 → application-{profile}.yml → 本文件
#   激活生产：启动参数或环境变量 SPRING_PROFILES_ACTIVE=prod（叠加 application-prod.yml）
#
# 【环境变量速查】数据库/缓存/密钥（详见各小节）
#   DB_HOST DB_PORT DB_NAME DB_USER DB_PASSWORD
#   REDIS_HOST REDIS_PORT  （可选 REDIS_PASSWORD）
#   JWT_SECRET  LANTU_ENCRYPTION_KEY  MCP_ALLOW_HTTP
#   ALLOW_INSECURE_LOCAL_DB_CREDS  GATEWAY_INVOKE_LOG_SUCCESS 等
#
# 【日志与排障】MDC 键 traceId 由 TraceIdFilter 注入；业务可搜 [gateway.invoke]、AccessLogFilter 的 >>>
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP：全局 Servlet 路径前缀 /api（例：http://主机:8080/api/actuator/health）
# -----------------------------------------------------------------------------
server:
  port: 8080
  servlet:
    context-path: /api

# -----------------------------------------------------------------------------
# Spring Boot：应用名、数据源、Redis、上传、消息队列、异步线程池、Flyway 等
# -----------------------------------------------------------------------------
spring:
  application:
    name: nexusai-connect
  # 配合 spring-boot-devtools：本地改代码并编译后自动重启，无需每次手动停启进程
  devtools:
    restart:
      enabled: true
  datasource:
    # MySQL JDBC；本地默认 localhost:3306 / lantu_connect；生产请 useSSL 与账号策略见 application-prod.yml
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:lantu_connect}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:30}
      minimum-idle: ${HIKARI_MIN_IDLE:8}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:30000}
      max-lifetime: ${HIKARI_MAX_LIFETIME_MS:1800000}
      # 开发排查连接泄漏时可设为 6000～60000；生产保持 0
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_MS:0}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      # host: ${REDIS_HOST:192.168.5.130}
      port: ${REDIS_PORT:6379}
      # password: ${REDIS_PASSWORD:redispassword}
      # 无密码时不要配置 password。若 Redis 有密码，可在此增加：password: ${REDIS_PASSWORD}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
  task:
    execution:
      pool:
        core-size: 8
        max-size: 32
        queue-capacity: 200
  flyway:
    # 既有库请先在目标环境执行 sql/lantu_connect.sql 与 sql/migrations/*.sql，再设 FLYWAY_ENABLED=true 做版本钉扎
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

# -----------------------------------------------------------------------------
# MyBatis-Plus：XML 映射路径、驼峰列名、逻辑删除取值
# -----------------------------------------------------------------------------
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # MySQL 保留字列名（如 t_security_setting.key / value）需反引号包裹
      column-format: "`%s`"
      logic-delete-value: 1
      logic-not-delete-value: 0

# -----------------------------------------------------------------------------
# JWT：双 Token；access-token-expiry / refresh-token-expiry 单位为秒
# 生产必须用环境变量 JWT_SECRET（≥32 字符）；JWT_SECRET 为空白时由代码使用内置仅开发用兜底
# -----------------------------------------------------------------------------
jwt:
  secret: ${JWT_SECRET:Lc-dev-z9QmK4vR7nX2pW8hYtSbAeUgOiJ5wFxC3jHlMnP6qR0sT1uVkxY7bNd-local-only}
  access-token-expiry: 7200
  refresh-token-expiry: 604800

# 会话列表地理位置（公网 IP 调用 ip-api.com，内网显示「局域网」；无外网时可设 enabled: false）
geoip:
  enabled: true
  timeout-ms: 2000

# =============================================================================
# lantu.* — 业务域安全、集成、日志开关、契约、幂等、技能包导入等（非 Spring 自有前缀）
# =============================================================================
lantu:
  # 敏感字段加解密主密钥；空则依赖代码策略；生产请设 LANTU_ENCRYPTION_KEY（长度建议 ≥32）
  encryption:
    key: ${LANTU_ENCRYPTION_KEY:}
  security:
    jwt-enabled: true
    # 本地 true：允许 root/弱口令数据源（仅开发）；生产见 application-prod.yml
    allow-insecure-local-database-credentials: ${ALLOW_INSECURE_LOCAL_DB_CREDS:true}
    allow-header-user-id-fallback: false
    require-https: ${REQUIRE_HTTPS:false}
    # 默认 false：/actuator/prometheus 需 JWT。本地/Docker 裸拉取指标可设 true（生产建议鉴权或内网隔离）
    permit-prometheus-without-auth: ${PERMIT_PROMETHEUS_WITHOUT_AUTH:false}
    expose-api-docs: ${EXPOSE_API_DOCS:true}
    # 仅在 Nginx/Ingress 等可信代理后设为 true，否则勿信任 X-Forwarded-For
    trust-proxy-forwarded-headers: ${TRUST_PROXY_FORWARDED_HEADERS:false}
    rate-limit:
      login-per-ip-per-minute: 50
      login-per-username-per-minute: 25
      register-per-ip-per-hour: 40
      captcha-per-ip-per-minute: 45
      send-sms-per-ip-per-hour: 30
    encryption-key: ${FIELD_ENCRYPTION_KEY:}
  # 网关 HTTP 语义：invoke 在上游失败时是否映射为 4xx/5xx（默认 true，AccessLog 与 ALB 可据此聚合）
  gateway:
    invoke-http-status-reflects-upstream: ${INVOKE_HTTP_STATUS_REFLECTS_UPSTREAM:true}
  logging:
    # 网关 invoke / invoke-stream：成功后是否打 INFO（默认 false）
    gateway-invoke-log-success: ${GATEWAY_INVOKE_LOG_SUCCESS:false}
    # 是否在日志中附带请求 payload 截断（默认 false；勿对大密钥/生产大 body 开启）
    gateway-invoke-log-payload-preview: ${GATEWAY_INVOKE_LOG_PAYLOAD_PREVIEW:false}
    # 失败日志中响应 body 预览最大字符数
    gateway-invoke-body-preview-max: 1024
    # payload 预览最大字符数（仅当 gateway-invoke-log-payload-preview=true）
    gateway-invoke-payload-preview-max: 300
    # 错误响应体预览：超过该字节则仅打占位符（0 表示不限制）；非流式接口仍受 ContentCachingResponseWrapper 整段缓存约束
    access-log-error-body-max-bytes: 262144
    # 请求 URI 含以下任一片段时不写错误 response 预览（如 /auth/login 返回 token）
    access-log-skip-error-body-path-fragments: /auth/login,/auth/refresh,/auth/register
  api-deprecation:
    enabled: true
    deprecated-patterns:
      - /v1/**
      - /agents/**
    write-blocked-patterns:
      - /v1/**
      - /agents/**
  system:
    # network/apply、acl/publish 为模拟响应；false 时在代码中接真实下发逻辑
    integration-mock: true
  integration:
    network-api-url: ${NETWORK_API_URL:}
    acl-api-url: ${ACL_API_URL:}
    # MCP 出站是否允许 http://（默认 true 便于本机联调；生产请叠 prod profile 或设 MCP_ALLOW_HTTP=false）
    mcp-allow-http: ${MCP_ALLOW_HTTP:true}
    # MCP 出站是否允许 localhost/127.0.0.1/私网解析（默认 true 本机联调；生产设 MCP_ALLOW_LOCAL_TARGETS=false）
    mcp-allow-local-targets: ${MCP_ALLOW_LOCAL_TARGETS:true}
    # MCP HTTP（Streamable）常见要求同时接受 JSON 与 SSE；与上游不符时再改
    mcp-http-accept: application/json, text/event-stream
    # 应用（app）启动令牌有效期（秒）：用于后端签发 launchToken/launchUrl 后一次性跳转
    app-launch-token-ttl-seconds: 300
    # MCP：同一 X-Api-Key 多次 /invoke 间复用上游 Mcp-Session-Id 的 Redis TTL（分钟，代码内 clamp 5–1440）
    mcp-session-ttl-minutes: 45
    # MCP HTTP 失败重试次数（每次请求独立；会话头在重试前会从 Redis 再读）
    mcp-invoke-retries: 1
    # OAuth2 client_credentials 请求令牌端点超时（秒）
    oauth2:
      connect-timeout-sec: 15
  notification:
    sms-enabled: ${NOTIFICATION_SMS_ENABLED:false}
    email-enabled: ${NOTIFICATION_EMAIL_ENABLED:false}
  contract:
    freeze-version: 2026-03-contract-v1
    freeze-effective-date: 2026-03-24
  idempotency:
    enabled: true
    processing-ttl-seconds: 60
    success-ttl-seconds: 86400
  # 技能包从 URL 拉取：SSRF 防护、大小与超时（allowed-host-suffixes 非空时仅允许匹配主机）
  skill-pack-import:
    max-bytes: 26214400
    connect-timeout-seconds: 15
    read-timeout-seconds: 90
    # 跟随 Location 的最大次数（不含最终 200 响应）
    max-redirects: 5
    https-only: ${SKILL_PACK_IMPORT_HTTPS_ONLY:true}
    allowed-host-suffixes: [ ]
    # 为 true 时必须配置 allowed-host-suffixes（缓解 DNS 重绑定类 SSRF）
    require-allowed-host-suffixes: ${SKILL_PACK_IMPORT_REQUIRE_SUFFIX:false}

# -----------------------------------------------------------------------------
# Resilience4j：熔断 / 限流 / 重试 / 舱壁 / 时限；实例名与 @CircuitBreaker(name="mcpInvoke") 等对应
# -----------------------------------------------------------------------------
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        sliding-window-size: 10
    instances:
      skillInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      networkApply:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      aclPublish:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      httpInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
      mcpInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
  ratelimiter:
    configs:
      default:
        limit-for-period: 100
        limit-refresh-period: 1m
        timeout-duration: 0s
    instances:
      authLogin:
        base-config: default
        limit-for-period: 30
        limit-refresh-period: 1m
      authRegister:
        base-config: default
        limit-for-period: 15
        limit-refresh-period: 1h
      authRefresh:
        base-config: default
        limit-for-period: 120
        limit-refresh-period: 1m
      authSendSms:
        base-config: default
        limit-for-period: 20
        limit-refresh-period: 1h
      captchaGenerate:
        base-config: default
        limit-for-period: 60
        limit-refresh-period: 1m
      fileUpload:
        base-config: default
        limit-for-period: 20
        limit-refresh-period: 1m
  retry:
    configs:
      default:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - java.io.IOException
          - java.net.http.HttpTimeoutException
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 50
        max-wait-duration: 0ms
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default

# 文件与技能包制品存储：storage-type=local（默认，落盘到 upload-dir）或 minio（对象存储，需配置 minio.*）
# -----------------------------------------------------------------------------
# 本地上传目录或 MinIO；artifact 与上传接口共用 storage-type
# -----------------------------------------------------------------------------
file:
  upload-dir: ${FILE_UPLOAD_DIR:/data/nexusai/uploads}
  max-size-mb: 50
  allowed-types: pdf,docx,csv,json,parquet,xlsx,jpg,jpeg,png,gif,svg
  # 存储模式 local | minio：上传与技能包下载均只使用当前模式（artifact_uri 须与该模式一致，不混合回退）
  storage-type: ${FILE_STORAGE_TYPE:local}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:nexusai-connect}

# -----------------------------------------------------------------------------
# 浏览器 CORS：多个来源用逗号分隔；relax-localhost=true 时额外允许 localhost/127.0.0.1 任意端口（Vite 等）
# -----------------------------------------------------------------------------
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
  relax-localhost: ${CORS_RELAX_LOCALHOST:true}

# -----------------------------------------------------------------------------
# OpenAPI 3 / Swagger UI 路径（是否匿名由 Security 与 lantu.security.expose-api-docs 决定）
# -----------------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# -----------------------------------------------------------------------------
# Actuator：健康、信息、Prometheus 指标；prometheus 是否匿名见 lantu.security.permit-prometheus-without-auth
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# -----------------------------------------------------------------------------
# Logback 根日志级别补充（细粒度见 logback-spring.xml 的 springProfile dev/prod/default）
# -----------------------------------------------------------------------------
logging:
  level:
    com.lantu.connect: ${LOG_LEVEL_LANTU:info}
    com.lantu.connect.common.mybatis: ${LOG_LEVEL_MYBATIS:info}
