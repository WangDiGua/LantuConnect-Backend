# =============================================================================
# application.yml — 应用唯一主配置（库、Redis、密钥等均在本文修改）
#
# 另有两个可选 import（非必备）：skill-external-catalog.yml（外部技能目录）、
# application-local.yml（本机零散覆盖，无则忽略）
# =============================================================================

spring:
  config:
    import:
      - optional:classpath:skill-external-catalog.yml
      - optional:classpath:application-local.yml
  application:
    name: nexusai-connect
  devtools:
    restart:
      enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/lantu_connect?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 8
      connection-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 0
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      # password: 若 Redis 有密码在此填写
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        auto-startup: false
  task:
    execution:
      pool:
        core-size: 8
        max-size: 32
        queue-capacity: 200
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8080
  servlet:
    context-path: /regis
  ssl:
    enabled: false
    key-store: classpath:keystore.p12
    key-store-password: ''
    key-store-type: PKCS12

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      column-format: "`%s`"
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: W9aAj8Gelv5D1BORiXMfx6LTYomqypuJHkIwK2ES3dhsbngPNFtcZ7rQz40UVC
  access-token-expiry: 7200
  refresh-token-expiry: 604800

geoip:
  enabled: true
  timeout-ms: 2000

lantu:
  encryption:
    key: bCJgWT36frAQZsUvui7ze0dYO92DcVGHwNkn8XoK5lPtqEya
  security:
    jwt-enabled: true
    allow-insecure-local-database-credentials: false
    allow-header-user-id-fallback: false
    require-https: false
    permit-prometheus-without-auth: false
    expose-api-docs: false
    trust-proxy-forwarded-headers: false
    rate-limit:
      login-per-ip-per-minute: 50
      login-per-username-per-minute: 25
      register-per-ip-per-hour: 40
      captcha-per-ip-per-minute: 45
      send-sms-per-ip-per-hour: 30
    encryption-key: hVe1vQCXF4x0criksOqtS98bEmUJAHK76jdWMglp
  gateway:
    invoke-http-status-reflects-upstream: true
  logging:
    gateway-invoke-log-success: false
    gateway-invoke-log-payload-preview: false
    gateway-invoke-body-preview-max: 1024
    gateway-invoke-payload-preview-max: 300
    access-log-error-body-max-bytes: 262144
    access-log-skip-error-body-path-fragments: /auth/login,/auth/refresh,/auth/register
  api-deprecation:
    enabled: true
    deprecated-patterns:
      - /v1/**
      - /agents/**
    write-blocked-patterns:
      - /v1/**
      - /agents/**
  system:
    integration-mock: true
  integration:
    network-api-url: ''
    acl-api-url: ''
    mcp-allow-http: false
    mcp-allow-local-targets: false
    mcp-http-accept: application/json, text/event-stream
    app-launch-token-ttl-seconds: 300
    mcp-session-ttl-minutes: 45
    mcp-invoke-retries: 1
    oauth2:
      connect-timeout-sec: 15
  notification:
    sms-enabled: false
    email-enabled: false
  contract:
    freeze-version: 2026-03-contract-v1
    freeze-effective-date: 2026-03-24
  idempotency:
    enabled: true
    processing-ttl-seconds: 60
    success-ttl-seconds: 86400
  skill-pack-import:
    max-bytes: 26214400
    connect-timeout-seconds: 45
    read-timeout-seconds: 90
    max-redirects: 5
    fetch-retries: 3
    fetch-retry-delay-ms: 1000
    https-only: true
    allowed-host-suffixes: [ ]
    require-allowed-host-suffixes: false
    git-clone-enabled: true
    git-clone-timeout-seconds: 120
    git-clone-allow-bare-repo-paths: true
    git-bare-repo-host-suffixes:
      - github.com
      - www.github.com
      - gitlab.com
      - www.gitlab.com
      - bitbucket.org
      - www.bitbucket.org
      - gitee.com
      - www.gitee.com
    git-clone-max-unpacked-bytes: 41943040

file:
  upload-dir: /data/nexusai/uploads
  max-size-mb: 50
  allowed-types: pdf,docx,csv,json,parquet,xlsx,jpg,jpeg,png,gif,svg
  storage-type: local
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: nexusai-connect

cors:
  # true：任意源（allowedOriginPatterns("*") + allowedHeaders("*")）；对内网/公网开放 API 时注意风险
  allow-all-origins: true
  # allow-all 为 true 时下列两项不生效，仅在不开放任意源时使用
  relax-localhost: true
  allowed-origins: ''

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        sliding-window-size: 10
    instances:
      skillInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      networkApply:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      aclPublish:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
        sliding-window-size: 10
      httpInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
      mcpInvoke:
        base-config: default
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        sliding-window-size: 20
  ratelimiter:
    configs:
      default:
        limit-for-period: 100
        limit-refresh-period: 1m
        timeout-duration: 0s
    instances:
      authLogin:
        base-config: default
        limit-for-period: 30
        limit-refresh-period: 1m
      authRegister:
        base-config: default
        limit-for-period: 15
        limit-refresh-period: 1h
      authRefresh:
        base-config: default
        limit-for-period: 120
        limit-refresh-period: 1m
      authSendSms:
        base-config: default
        limit-for-period: 20
        limit-refresh-period: 1h
      captchaGenerate:
        base-config: default
        limit-for-period: 60
        limit-refresh-period: 1m
      fileUpload:
        base-config: default
        limit-for-period: 20
        limit-refresh-period: 1m
  retry:
    configs:
      default:
        max-attempts: 2
        wait-duration: 300ms
        retry-exceptions:
          - java.io.IOException
          - java.net.http.HttpTimeoutException
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default
  bulkhead:
    configs:
      default:
        max-concurrent-calls: 50
        max-wait-duration: 0ms
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 10s
        cancel-running-future: true
    instances:
      skillInvoke:
        base-config: default
      networkApply:
        base-config: default
      aclPublish:
        base-config: default
      httpInvoke:
        base-config: default
      mcpInvoke:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.lantu.connect: info
    com.lantu.connect.common.mybatis: info
    org.springframework.web: info

---
spring:
  config:
    activate:
      on-profile: dev
  devtools:
    restart:
      enabled: true
  rabbitmq:
    listener:
      simple:
        auto-startup: false

file:
  upload-dir: D:/LantuConnect/LantuConnect-Backend/skills_local_data

lantu:
  security:
    allow-insecure-local-database-credentials: true
    expose-api-docs: true
    require-https: false
  integration:
    mcp-allow-http: true
    mcp-allow-local-targets: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    com.lantu.connect: debug
    org.springframework.web: info
