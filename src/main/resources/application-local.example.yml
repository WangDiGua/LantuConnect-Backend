# =============================================================================
# 本地 / 私有配置模板（复制为 application-local.yml；勿提交含生产密钥的副本）
#
# 主配置 application.yml 中占位均为 ${ENV}，无默认值；本文件给出与原先内联默认等价的示例，
# 用于本地启动。亦可不设此文件，改为导出同名环境变量（见 application.yml 顶部说明）。
#
# 启用 dev profile 时（spring.profiles.active=dev），文末第二段会覆盖 file.upload-dir。
# Docker Compose 等场景若已注入 SPRING_DATASOURCE_* 等，可与本文件提供的 YAML 键合并使用。
# =============================================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lantu_connect?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: ""

  # profiles:
  #   active: dev

server:
  port: 8080
  servlet:
    context-path: /regis
  ssl:
    enabled: false
    key-store: classpath:keystore.p12
    key-store-password: ""

jwt:
  secret: local-dev-change-this-to-random-secret-min-32chars
  access-token-expiry: 7200
  refresh-token-expiry: 604800

lantu:
  encryption:
    key: local-dev-lantu-encryption-32b-key!!
  security:
    encryption-key: local-dev-security-encryption-key!!
  hosted-llm:
    enabled: false
    base-url: ""
    api-key: ""
    default-model: gpt-4o-mini
  system:
    integration-mock: true

file:
  upload-dir: /data/nexusai/uploads

cors:
  allow-all-origins: true
  relax-localhost: true
  allowed-origins: ""

---
spring:
  config:
    activate:
      on-profile: dev

file:
  upload-dir: D:/LantuConnect/LantuConnect-Backend/skills_local_data
